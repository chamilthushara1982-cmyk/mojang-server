<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mojang Studios - Secure Vote System</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: 'Press Start 2P', cursive;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            color: #ff3131;
            font-size: 24px;
            text-shadow: 0 0 10px #ff3131;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Secure Login/Register Section */
        .auth-section {
            background: #111;
            border: 3px solid #ff3131;
            padding: 30px;
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 0 15px rgba(255, 49, 49, 0.1);
        }

        .auth-section p {
            font-size: 10px;
            color: #aaa;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 9px;
            color: #ff3131;
            margin-bottom: 8px;
            text-align: left;
            padding-left: 15%;
        }

        input[type="text"], input[type="password"] {
            padding: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            border: 3px solid black;
            background: #222;
            color: white;
            outline: none;
            width: 70%;
            text-align: center;
        }

        .input-btn {
            padding: 15px 25px;
            background: #ff3131;
            color: white;
            border: 3px solid black;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            width: 70%;
        }

        .input-btn:hover {
            background: white;
            color: black;
        }

        /* Vote Grid and Boxes */
        .vote-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            opacity: 0.2; /* නම සහ Password දෙනකන් Blur වෙලා තියෙන්නේ */
            pointer-events: none; /* නම දෙනකන් Click කරන්න බෑ */
            transition: 0.5s;
        }

        .active-grid {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        .vote-card {
            background: #151515;
            border: 3px solid #5865F2;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 10px rgba(88, 101, 242, 0.2);
            transition: 0.3s;
        }

        .vote-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px #5865F2;
        }

        .vote-card h2 {
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .vote-count {
            color: #ff3131;
            font-size: 11px;
            margin-bottom: 20px;
        }

        .vote-btn {
            padding: 12px 15px;
            background: #5865F2;
            color: white;
            border: 2px solid black;
            font-family: 'Press Start 2P', cursive;
            font-size: 9px;
            cursor: pointer;
            width: 100%;
        }

        .vote-btn:hover {
            background: white;
            color: black;
        }

        .status-msg {
            font-size: 10px;
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }
        .success { color: #5C8E32; }
        .error { color: #ff3131; }
    </style>
</head>
<body>

    <h1>🗳️ SECURE VOTE SYSTEM 🗳️</h1>

    <!-- Authentication Section (Username + Password) -->
    <div class="auth-section">
        <p>IF YOU ARE NEW, ENTER A NEW PASSWORD TO REGISTER.<br>RETURNING PLAYERS MUST ENTER THEIR CORRECT PASSWORD.</p>
        
        <div class="input-group">
            <label>MINECRAFT USERNAME:</label>
            <input type="text" id="mc-username" placeholder="Enter Username...">
        </div>

        <div class="input-group">
            <label>SECURITY PASSWORD:</label>
            <input type="password" id="mc-password" placeholder="Enter Password...">
        </div>

        <button class="input-btn" onclick="handleAuth()">REGISTER / LOGIN</button>
        <div id="status-msg" class="status-msg"></div>
    </div>

    <!-- Vote Section Boxes -->
    <div class="vote-grid" id="vote-box-grid">
        
        <!-- Box 1 -->
        <div class="vote-card">
            <h2>Play.MC</h2>
            <div class="vote-count">Votes: <span id="count-play">0</span></div>
            <button class="vote-btn" onclick="castVote('play')">VOTE</button>
        </div>

        <!-- Box 2 -->
        <div class="vote-card">
            <h2>Gift.LK</h2>
            <div class="vote-count">Votes: <span id="count-gift">0</span></div>
            <button class="vote-btn" onclick="castVote('gift')">VOTE</button>
        </div>

        <!-- Box 3 -->
        <div class="vote-card">
            <h2>Rank.info</h2>
            <div class="vote-count">Votes: <span id="count-rank">0</span></div>
            <button class="vote-btn" onclick="castVote('rank')">VOTE</button>
        </div>

        <!-- Box 4 -->
        <div class="vote-card">
            <h2>Rule.net</h2>
            <div class="vote-count">Votes: <span id="count-rule">0</span></div>
            <button class="vote-btn" onclick="castVote('rule')">VOTE</button>
        </div>

        <!-- Box 5 -->
        <div class="vote-card">
            <h2>Sponser.com</h2>
            <div class="vote-count">Votes: <span id="count-sponser">0</span></div>
            <button class="vote-btn" onclick="castVote('sponser')">VOTE</button>
        </div>

    </div>

    <!-- Firebase Configuration & Realtime Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKh9nmIeyDRGPWvn2sr49klT-I2zd298s",
            authDomain: "mojang-studios-2dcd1.firebaseapp.com",
            databaseURL: "https://mojang-studios-2dcd1-default-rtdb.firebaseio.com/",
            projectId: "mojang-studios-2dcd1",
            storageBucket: "mojang-studios-2dcd1.firebasestorage.app",
            messagingSenderId: "463020540404",
            appId: "1:463020540404:web:1032bb6c2618b93b91f9a1"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let currentUsername = "";
        let serverVotes = { play: {}, gift: {}, rank: {}, rule: {}, sponser: {} };
        let userVoteLog = {};

        // ඩේටාබේස් එකෙන් Live Vote දත්ත ලබා ගැනීම
        const votesRef = ref(database, 'mojang_server_votes');
        onValue(votesRef, (snapshot) => {
            if (snapshot.exists()) {
                serverVotes = snapshot.val();
                // හැම වෙලේම Array Structure එක නිවැරදිව තියාගන්න ආරක්ෂිත පියවරක්
                ['play', 'gift', 'rank', 'rule', 'sponser'].forEach(site => {
                    if (!serverVotes[site]) serverVotes[site] = {};
                });
            }
            updateUI();
        });

        // ඩේටාබේස් එකෙන් Live Vote Logs ලබා ගැනීම
        const logsRef = ref(database, 'mojang_user_vote_log');
        onValue(logsRef, (snapshot) => {
            if (snapshot.exists()) {
                userVoteLog = snapshot.val();
            }
        });

        window.handleAuth = function() {
            let inputName = document.getElementById('mc-username').value.trim().toLowerCase();
            let inputPassword = document.getElementById('mc-password').value.trim();
            let statusDiv = document.getElementById('status-msg');

            if (inputName === "" || inputPassword === "") {
                statusDiv.className = "status-msg error";
                statusDiv.innerText = "ENTER BOTH NAME & PASSWORD!";
                return;
            }

            const dbRef = ref(database);
            get(child(dbRef, `mojang_player_accounts/${inputName}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    let registeredPassword = snapshot.val();
                    if (registeredPassword === inputPassword) {
                        currentUsername = inputName;
                        activateVoting("LOGIN SUCCESSFUL! WELCOME BACK.", true);
                    } else {
                        currentUsername = "";
                        activateVoting("INCORRECT PASSWORD FOR THIS USER!", false);
                    }
                } else {
                    // අලුත් ප්ලේයර් කෙනෙක් නම් Firebase එකේ රෙජිස්ටර් කිරීම
                    set(ref(database, `mojang_player_accounts/${inputName}`), inputPassword).then(() => {
                        currentUsername = inputName;
                        activateVoting("ACCOUNT CREATED! VOTING UNLOCKED.", true);
                    });
                }
            }).catch((error) => {
                statusDiv.className = "status-msg error";
                statusDiv.innerText = "DATABASE ERROR!";
            });
        }

        function activateVoting(message, isSuccess) {
            let statusDiv = document.getElementById('status-msg');
            let gridDiv = document.getElementById('vote-box-grid');

            if (isSuccess) {
                statusDiv.className = "status-msg success";
                statusDiv.innerText = message;
                gridDiv.classList.add('active-grid');
                updateUI();
            } else {
                statusDiv.className = "status-msg error";
                statusDiv.innerText = message;
                gridDiv.classList.remove('active-grid');
                const sites = ['play', 'gift', 'rank', 'rule', 'sponser'];
                sites.forEach(site => document.getElementById('count-' + site).innerText = "0");
            }
        }

        function updateUI() {
            if (!currentUsername) return;
            const sites = ['play', 'gift', 'rank', 'rule', 'sponser'];
            sites.forEach(site => {
                let count = (serverVotes[site] && serverVotes[site][currentUsername]) || 0;
                document.getElementById('count-' + site).innerText = count;
            });
        }

        window.castVote = function(site) {
            if (!currentUsername) {
                alert("Please login/register first!");
                return;
            }

            let now = new Date().getTime();
            let logKey = currentUsername + "_" + site;
            let lastVotedTime = userVoteLog[logKey];

            // පැය 24ක සීමාව පරීක්ෂා කිරීම
            if (lastVotedTime && (now - lastVotedTime < 86400000)) {
                let timeLeft = 86400000 - (now - lastVotedTime);
                let hoursLeft = Math.ceil(timeLeft / (1000 * 60 * 60));
                alert("You already voted here today! Try again in " + hoursLeft + " hours.");
                return;
            }

            if (!serverVotes[site]) serverVotes[site] = {};
            if (!serverVotes[site][currentUsername]) {
                serverVotes[site][currentUsername] = 0;
            }
            serverVotes[site][currentUsername] += 1;
            userVoteLog[logKey] = now;

            // Firebase එකට Live Save කිරීම
            set(ref(database, 'mojang_server_votes'), serverVotes);
            set(ref(database, 'mojang_user_vote_log'), userVoteLog);

            updateUI();
            alert("Thank you for voting on " + site.toUpperCase() + "!");
        }
    </script>

</body>
</html>
