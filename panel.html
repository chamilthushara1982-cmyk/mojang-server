<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mojang Studios - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: 'Press Start 2P', cursive;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            color: #ff3131;
            font-size: 24px;
            text-shadow: 0 0 10px #ff3131;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Admin Gate Login */
        .admin-auth-box {
            background: #111;
            border: 4px solid #ff3131;
            padding: 30px;
            text-align: center;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(255, 49, 49, 0.2);
        }

        .admin-auth-box p {
            font-size: 10px;
            color: #aaa;
            margin-bottom: 20px;
        }

        .input-field {
            margin-bottom: 20px;
        }

        .input-field label {
            display: block;
            font-size: 9px;
            color: #ff3131;
            margin-bottom: 8px;
            text-align: left;
            padding-left: 10%;
        }

        input[type="text"], input[type="password"] {
            padding: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            border: 3px solid black;
            background: #222;
            color: white;
            outline: none;
            width: 80%;
            text-align: center;
        }

        .login-btn {
            padding: 15px 25px;
            background: #ff3131;
            color: white;
            border: 3px solid black;
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            cursor: pointer;
            width: 80%;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: white;
            color: black;
        }

        .error-msg {
            color: #ff3131;
            font-size: 10px;
            margin-top: 15px;
        }

        /* Admin Dashboard Layout */
        .dashboard-container {
            display: none; /* Login වෙනකන් හංගනවා */
            width: 100%;
            max-width: 1200px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Stats Cards */
        .summary-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .stat-card {
            background: #151515;
            border: 2px solid #5865F2;
            padding: 20px;
            flex: 1;
            min-width: 250px;
            text-align: center;
            font-size: 11px;
        }
        .stat-card span {
            display: block;
            font-size: 20px;
            color: #ff3131;
            margin-top: 10px;
        }

        /* Database Table */
        .table-wrapper {
            background: #111;
            border: 3px solid #ff3131;
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 9px;
            min-width: 900px;
        }

        th, td {
            padding: 15px;
            border: 1px solid #222;
            line-height: 1.5;
        }

        th {
            background: #1a1a1a;
            color: #ff3131;
            border-bottom: 3px solid #ff3131;
        }

        tr:nth-child(even) {
            background: #161616;
        }

        /* Rank Badges */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 8px;
            margin: 2px;
            border: 1px solid black;
            color: white;
        }
        .badge-vip { background: #e5c158; color: black; }     /* Gold */
        .badge-team { background: #ff3131; }                  /* Red */
        .badge-18 { background: #b967ff; }                    /* Purple */
        .badge-none { color: #555; }

    </style>
</head>
<body>

    <h1>🚨 MOJANG STUDIOS ADMIN PANEL 🚨</h1>

    <!-- 1. Admin Secure Login Gate -->
    <div class="admin-auth-box" id="admin-login-gate">
        <p>SECURE AREA: AUTHORIZED ADMIN PERSONNEL ONLY</p>
        
        <div class="input-field">
            <label>ADMIN USERNAME:</label>
            <input type="text" id="admin-user" placeholder="Username...">
        </div>

        <div class="input-field">
            <label>SECRET PASSWORD:</label>
            <input type="password" id="admin-pass" placeholder="Password...">
        </div>

        <button class="login-btn" onclick="checkAdminLogin()">ACCESS DASHBOARD</button>
        <div id="error-output" class="error-msg"></div>
    </div>

    <!-- 2. Main Admin Dashboard -->
    <div class="dashboard-container" id="admin-dashboard">
        
        <!-- Top Overview Summary -->
        <div class="summary-bar">
            <div class="stat-card">
                TOTAL REGISTERED PLAYERS
                <span id="stat-players">0</span>
            </div>
            <div class="stat-card" style="border-color: #5C8E32;">
                TOTAL SERVER VOTES
                <span id="stat-votes" style="color: #5C8E32;">0</span>
            </div>
        </div>

        <!-- Players Progress Database Table -->
        <h2>👤 PLAYER VOTES & PROGRESS DATABASE</h2>
        <br>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>USERNAME</th>
                        <th>PLAY.MC</th>
                        <th>GIFT.LK</th>
                        <th>RANK.INFO</th>
                        <th>RULE.NET</th>
                        <th>SPONSER.COM</th>
                        <th style="color: white;">TOTAL POINTS</th>
                        <th>ELIGIBLE RANKS</th>
                    </tr>
                </thead>
                <tbody id="player-table-body">
                    <!-- JavaScript මඟින් දත්ත මෙතනට Auto එකතු කරයි -->
                </tbody>
            </table>
        </div>

    </div>

    <!-- Firebase Admin Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKh9nmIeyDRGPWvn2sr49klT-I2zd298s",
            authDomain: "mojang-studios-2dcd1.firebaseapp.com",
            databaseURL: "https://mojang-studios-2dcd1-default-rtdb.firebaseio.com/",
            projectId: "mojang-studios-2dcd1",
            storageBucket: "mojang-studios-2dcd1.firebasestorage.app",
            messagingSenderId: "463020540404",
            appId: "1:463020540404:web:1032bb6c2618b93b91f9a1"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        window.checkAdminLogin = function() {
            let user = document.getElementById('admin-user').value.trim();
            let pass = document.getElementById('admin-pass').value.trim();
            let errOut = document.getElementById('error-output');

            // Admin Login Credentials (නව Username සහ Password එක මෙතනට යාවත්කාලීන කර ඇත)
            if (user.toLowerCase() === "admin123" && pass === "Koc574501") {
                document.getElementById('admin-login-gate').style.display = "none";
                document.getElementById('admin-dashboard').style.display = "block";
                loadDashboardLive();
            } else {
                errOut.innerText = "ACCESS DENIED: INVALID ADMIN CREDENTIALS!";
            }
        }

        function loadDashboardLive() {
            // Live ලියාපදිංචි ප්ලේයර්ස්ලා ප්‍රමාණය ගැනීම
            onValue(ref(database, 'mojang_player_accounts'), (accountsSnapshot) => {
                let accounts = accountsSnapshot.exists() ? accountsSnapshot.val() : {};
                let totalPlayers = Object.keys(accounts).length;
                document.getElementById('stat-players').innerText = totalPlayers;

                // Live Votes දත්ත අරන් Table එක ලස්සනට අප්ඩේට් කිරීම
                onValue(ref(database, 'mojang_server_votes'), (votesSnapshot) => {
                    let serverVotes = votesSnapshot.exists() ? votesSnapshot.val() : { play: {}, gift: {}, rank: {}, rule: {}, sponser: {} };
                    let tableBody = document.getElementById('player-table-body');
                    tableBody.innerHTML = "";

                    let grandTotalVotes = 0;

                    // හැම ප්ලේයර් කෙනෙකුටම අදාළව Row එකක් හැදීම
                    for (let pName in accounts) {
                        let playV = (serverVotes.play && serverVotes.play[pName]) || 0;
                        let giftV = (serverVotes.gift && serverVotes.gift[pName]) || 0;
                        let rankV = (serverVotes.rank && serverVotes.rank[pName]) || 0;
                        let ruleV = (serverVotes.rule && serverVotes.rule[pName]) || 0;
                        let sponserV = (serverVotes.sponser && serverVotes.sponser[pName]) || 0;

                        let totalP = playV + giftV + rankV + ruleV + sponserV;
                        grandTotalVotes += totalP;

                        // Eligible Ranks Badges සෑදීම
                        let badges = "";
                        if (totalP >= 250) badges += '<span class="badge badge-vip">VIP</span>';
                        if (totalP >= 200) badges += '<span class="badge badge-team">TEAM</span>';
                        if (totalP >= 150) badges += '<span class="badge badge-18">18+</span>';
                        if (badges === "") badges = '<span class="badge-none">NONE</span>';

                        let row = `<tr>
                            <td>${pName.toUpperCase()}</td>
                            <td>${playV}</td>
                            <td>${giftV}</td>
                            <td>${rankV}</td>
                            <td>${ruleV}</td>
                            <td>${sponserV}</td>
                            <td style="color: #ff3131; font-weight: bold;">${totalP}</td>
                            <td>${badges}</td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    }
                    document.getElementById('stat-votes').innerText = grandTotalVotes;
                });
            });
        }
    </script>

</body>
</html>
